{% set name = "agate-excel" %}
{% set version = "0.4.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 28426618c90747111e6d566e983d838f1e2fae641ea6970d7acb0e9d4b384091

build:
  number: 0
  skip: true  # [py<38] 
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - pip
    - python
    - wheel
    - setuptools
  run:
    - python
    - olefile
    - xlrd >=0.9.4
    - agate >=1.5.0
    - openpyxl >=2.3.0

test:
  source_files:
    - tests
    - examples
  requires:
    - pip
    - pytest
  imports:
    - agateexcel
  commands:
    - pip check
    - pytest tests -v

about:
  home: https://agate-excel.readthedocs.org/
  license_file: COPYING
  license: MIT
  license_family: MIT
  summary: agate-excel adds read support for Excel files (xls and xlsx) to agate.
  description: agate-excel adds read support for Excel files (xls and xlsx) to agate.
  doc_url: https://agate-excel.readthedocs.org/
  dev_url: https://github.com/wireservice/agate-excel

extra:
  recipe-maintainers:
    - pmlandwehr
